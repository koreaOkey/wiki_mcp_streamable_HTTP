apiVersion: apps/v1
kind: Deployment
metadata:
  name: wiki-mcp-test-deployment
  namespace: mcp-team
  labels:
    app: wiki-mcp-test-pod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wiki-mcp-test-pod
  template:
    metadata:
      labels:
        app: wiki-mcp-test-pod
    spec:
      containers:
        - name: wiki-mcp-test
          image: example.registry.local/mcp-team/wiki-mcp-test:20260424
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          # [git_sop 대비 변경] CI에서 만든 ConfigMap/Secret을 런타임 env로 주입.
          envFrom:
            - configMapRef:
                name: wiki-mcp-test-env
            - secretRef:
                name: wiki-mcp-test-secret
          # [git_sop 대비 변경] 배포 안정성을 위해 readiness/liveness probe 추가.
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: wiki-mcp-test-svc
  namespace: mcp-team
spec:
  type: ClusterIP
  selector:
    app: wiki-mcp-test-pod
  ports:
    - protocol: TCP
      port: 8002
      targetPort: 8002
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: wiki-mcp-test-route
  namespace: mcp-team
spec:
  # [git_sop 대비 변경] ROUTE_HOST_SUFFIX 변수로 host 생성.
  host: wiki-mcp-test.ocpdev.shinhan.com
  path: /
  to:
    kind: Service
    name: wiki-mcp-test-svc
    weight: 100
  port:
    targetPort: 8002
  wildcardPolicy: None

