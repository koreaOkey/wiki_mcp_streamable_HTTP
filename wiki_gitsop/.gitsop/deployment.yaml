apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{PN}}-deployment
  namespace: {{NS}}
  labels:
    app: {{PN}}-pod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{PN}}-pod
  template:
    metadata:
      labels:
        app: {{PN}}-pod
    spec:
      containers:
        - name: {{PN}}
          image: {{REPO}}/{{NS}}/{{PN}}:{{TMPTIME}}
          imagePullPolicy: Always
          ports:
            - containerPort: {{PORT}}
          # [git_sop 대비 변경] CI에서 만든 ConfigMap/Secret을 런타임 env로 주입.
          envFrom:
            - configMapRef:
                name: {{PN}}-env
            - secretRef:
                name: {{PN}}-secret
          # [git_sop 대비 변경] 배포 안정성을 위해 readiness/liveness probe 추가.
          readinessProbe:
            httpGet:
              path: /health
              port: {{PORT}}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{PORT}}
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: {{PN}}-svc
  namespace: {{NS}}
spec:
  type: ClusterIP
  selector:
    app: {{PN}}-pod
  ports:
    - protocol: TCP
      port: {{PORT}}
      targetPort: {{PORT}}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{PN}}-route
  namespace: {{NS}}
spec:
  # [git_sop 대비 변경] ROUTE_HOST_SUFFIX 변수로 host 생성.
  host: {{PN}}.{{ROUTE_HOST_SUFFIX}}
  path: /
  to:
    kind: Service
    name: {{PN}}-svc
    weight: 100
  port:
    targetPort: {{PORT}}
  wildcardPolicy: None
